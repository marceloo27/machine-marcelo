<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcelo's Machine</title>
    <style>
        button:hover{
            background: #fdbaff;
            transform: scale(1.05);
        }
        @keyframes surgindo {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            animation: surgindo 0.8s ease-out;
        }

    </style>
</head>

<body style="margin: 0; padding: 0; background-image: url(fundo.jpg);">
    <center>
        <header style="margin: 0; background-color: #781b77; width: 100%; padding: 20px 0; background-image: linear-gradient(to right, #781b77, #000022 );">
        <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
            <h1 style="color: white;"><b>Marcelo's Machine 💻</b></h1>
            <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js" type="module"></script>
            <dotlottie-wc src="https://lottie.host/3c88fb01-1896-40e4-b6ce-6ba8b526f6f4/8Sjbp6yN3h.lottie" style="width: 100px;height: 100px" autoplay loop></dotlottie-wc>
        </div>
        
        </header>
      
        <div class="container">
        <h2 style="color: #ece3ff;">DECIMAL</h2>

        <h3 style="color: #ece3ff;">Digite um número decimal:</h3>
        <input style=" width: 70px;height: 10px; padding: 10px; border-radius: 20px; border: none; font-size: 15px; margin-bottom: 5px; outline: none;" id="demo1" type="text" placeholder="Ex: 42">
        <br><br>

        <button style= "background-color: #fea50e; border-radius: 20px; color: white; width: 100px; transition: 0.3s;" onclick="converter()"><b>CONVERTER</b></button>

        <h3 style="color: white;">RESULTADOS:</h3>
        <p style="color: white;">OCTAL:
        <div id="demo2"></div>
        </p>
        <p style="color: white;">HEXADECIMAL:
        <div id="demo3"></div>
        </p>
        <p style="color: white;">BINÁRIO:
        <div id="demo4"></div>
        </p>
        <button style="border-radius: 20PX; text-decoration: none;"><a href="octal.html">OCTAL</a></button>
        <button style="border-radius: 20PX; text-decoration: none;"><a href="hexa.html">HEXA</a></button>
        <button style="border-radius: 20PX; text-decoration: none;"><a href="bin.html">BIN</a></button>

        </div>
       
  
    </center>
    <footer style="position: fixed; bottom: 0; left: 0; width: 100%; background-color: #2c002b; color: white; text-align: center; padding: 10px 0; font-family: sans-serif;">
        Desenvolvido por Marcelo &copy; CCOB-2026
    </footer>

    <script>
        function converter() {
            var decimal = Number(demo1.value);

            demo2.innerHTML = `<p style = "color:  #FFFF33;"><b>${decimal.toString(8)}</b></p>`;
            demo3.innerHTML = `<p style = "color:  #FFFF33;"><b>${decimal.toString(16)}</b></p>`;
            demo4.innerHTML = `<p style = "color:  #FFFF33;"><b>${decimal.toString(2)}</b></p>`;
        }
    </script>
</body>

</html>
